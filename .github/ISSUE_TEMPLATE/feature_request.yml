name: Feature request
description: Suggest an improvement for gos.
title: "feat: "
labels:
  - enhancement
  - needs triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, command, or docs change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - installer
        - rollback
        - checksum/security
        - cache
        - platform support
        - completions
        - packaging
        - documentation
        - release automation
        - other
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help test or implement this.
