name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck gos.sh install.sh completions/gos.bash scripts/*.bash scripts/*.sh tests/*.bash

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    env:
      SHFMT_VERSION: v3.13.1
    steps:
      - uses: actions/checkout@v7

      - name: Install shfmt
        run: |
          curl -fsSL -o /tmp/shfmt "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt
          shfmt --version

      - name: Run shfmt
        run: |
          shfmt -d -i 2 -ci -bn .

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install completion shells
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Bash syntax
        run: |
          bash -n gos.sh install.sh completions/gos.bash scripts/build-windows-package.bash scripts/sync-bash-command-completions.bash scripts/sync-command-surfaces.bash scripts/sync-embedded-completions.bash scripts/sync-fish-command-completions.bash scripts/sync-man-page.bash scripts/sync-readme-usage.bash scripts/sync-zsh-command-completions.bash scripts/update-changelog.bash scripts/update-homebrew-tap.sh scripts/update-packaging.bash scripts/validate-local.bash tests/changelog.bash tests/checksum.bash tests/completions.bash tests/detection.bash tests/features.bash tests/homebrew-tap.bash tests/install-transaction.bash tests/install-sh.bash tests/install-ps1.bash tests/lib.bash tests/packaging.bash tests/windows-extract.bash tests/workflows.bash

      - name: Command surface sync
        run: |
          bash scripts/sync-command-surfaces.bash --check

      - name: PowerShell syntax
        if: runner.os == 'Windows'
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command '$files = @("install.ps1", "packaging/chocolatey/tools/chocolateyInstall.ps1", "packaging/chocolatey/tools/chocolateyUninstall.ps1", "packaging/windows/uninstall.ps1", "tests/install-ps1.ps1"); foreach ($file in $files) { $errors = $null; $tokens = $null; [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null; if ($errors.Count) { $errors | Format-List; exit 1 } }'

      - name: PowerShell installer functional test
        if: runner.os == 'Windows'
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests/install-ps1.ps1

      - name: Run checksum tests
        run: |
          bash tests/checksum.bash

      - name: Run completion tests
        run: |
          bash tests/completions.bash

      - name: Run transactional install tests
        run: |
          bash tests/install-transaction.bash

      - name: Run installer tests
        run: |
          bash tests/install-sh.bash

      - name: Run PowerShell installer tests
        run: |
          bash tests/install-ps1.bash

      - name: Run packaging automation tests
        if: runner.os == 'Linux'
        run: |
          bash tests/packaging.bash

      - name: Run Homebrew tap automation tests
        if: runner.os == 'Linux'
        run: |
          bash tests/homebrew-tap.bash

      - name: Run changelog automation tests
        run: |
          bash tests/changelog.bash

      - name: Run feature tests
        run: |
          bash tests/features.bash

      - name: Run platform detection tests
        run: |
          bash tests/detection.bash

      - name: Run Windows extraction tests
        run: |
          bash tests/windows-extract.bash

      - name: Smoke gos commands
        run: |
          ./gos.sh version
          ./gos.sh help

      - name: Zsh completion syntax
        if: runner.os != 'Windows'
        run: |
          zsh -n completions/gos.zsh

      - name: Fish completion syntax
        if: runner.os == 'Linux'
        run: |
          fish --no-config --no-execute completions/gos.fish

  workflow-validation:
    name: Workflow Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate workflow YAML and invariants
        run: |
          bash tests/workflows.bash
