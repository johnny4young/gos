name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck gos.sh install.sh completions/gos.bash scripts/*.bash tests/*.bash

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install completion shells
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Bash syntax
        run: |
          bash -n gos.sh install.sh completions/gos.bash scripts/build-windows-package.bash scripts/update-changelog.bash scripts/update-packaging.bash tests/changelog.bash tests/checksum.bash tests/detection.bash tests/features.bash tests/install-transaction.bash tests/install-sh.bash tests/install-ps1.bash tests/packaging.bash tests/windows-extract.bash tests/workflows.bash

      - name: PowerShell installer syntax
        if: runner.os == 'Windows'
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command '$files = @("install.ps1", "packaging/windows/uninstall.ps1", "tests/install-ps1.ps1"); foreach ($file in $files) { $errors = $null; $tokens = $null; [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null; if ($errors.Count) { $errors | Format-List; exit 1 } }'

      - name: PowerShell installer functional test
        if: runner.os == 'Windows'
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tests/install-ps1.ps1

      - name: Run checksum tests
        run: |
          bash tests/checksum.bash

      - name: Run transactional install tests
        run: |
          bash tests/install-transaction.bash

      - name: Run installer tests
        run: |
          bash tests/install-sh.bash

      - name: Run PowerShell installer tests
        run: |
          bash tests/install-ps1.bash

      - name: Run packaging automation tests
        if: runner.os == 'Linux'
        run: |
          bash tests/packaging.bash

      - name: Run changelog automation tests
        run: |
          bash tests/changelog.bash

      - name: Run feature tests
        run: |
          bash tests/features.bash

      - name: Run platform detection tests
        run: |
          bash tests/detection.bash

      - name: Run Windows extraction tests
        run: |
          bash tests/windows-extract.bash

      - name: Smoke gos commands
        run: |
          ./gos.sh version
          ./gos.sh help

      - name: Zsh completion syntax
        if: runner.os != 'Windows'
        run: |
          zsh -n completions/gos.zsh

      - name: Fish completion syntax
        if: runner.os == 'Linux'
        run: |
          fish --no-config --no-execute completions/gos.fish

  workflow-validation:
    name: Workflow Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow YAML and invariants
        run: |
          bash tests/workflows.bash
