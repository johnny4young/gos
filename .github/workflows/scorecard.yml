name: Scorecard

# OpenSSF Scorecard supply-chain analysis. Results are published to the public
# Scorecard API (for the README badge) and uploaded to the repository's code
# scanning dashboard.

on:
  branch_protection_rule:
  schedule:
    # Weekly, staggered off the top of the hour.
    - cron: "27 7 * * 1"
  push:
    branches:
      - main

# Least privilege by default; the analysis job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code scanning dashboard.
      security-events: write
      # Publish results to the OpenSSF API via keyless (OIDC) signing.
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          sarif_file: results.sarif
