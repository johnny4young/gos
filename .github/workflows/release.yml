name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.1.0). Release notes use CHANGELOG.md Unreleased bullets or git commits since the previous tag.'
        required: true

permissions:
  contents: read

# Serialize releases: two overlapping runs would race the version-bump push
# and could tag the wrong commit.
concurrency:
  group: release
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  validate-release-ref:
    name: Validate Release Ref
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-ref.outputs.version }}
      tag: ${{ steps.release-ref.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release ref
        id: release-ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'

          case "$EVENT_NAME" in
            workflow_dispatch)
              if [[ "$REF_NAME" != "main" ]]; then
                printf '::error::Manual releases must be run from main, got %q\n' "$REF_NAME"
                exit 1
              fi
              VERSION="$INPUT_VERSION"
              if [[ ! "$VERSION" =~ $semver_re ]]; then
                printf '::error::Invalid version format %q. Use semver: 1.2.3 or 1.2.3-rc1 (no v prefix)\n' "$VERSION"
                exit 1
              fi
              TAG="v${VERSION}"
              ;;
            push)
              TAG="$REF_NAME"
              if [[ "$TAG" != v* ]]; then
                printf '::error::Release tag must start with v, got %q\n' "$TAG"
                exit 1
              fi
              VERSION="${TAG#v}"
              if [[ ! "$VERSION" =~ $semver_re ]]; then
                printf '::error::Invalid release tag %q. Use v1.2.3 or v1.2.3-rc1\n' "$TAG"
                exit 1
              fi
              ;;
            *)
              printf '::error::Unsupported release event %q\n' "$EVENT_NAME"
              exit 1
              ;;
          esac

          # Tag-push releases must point at a commit that is on main; manual
          # releases are already restricted to the main ref above.
          if [ "$EVENT_NAME" = "push" ]; then
            git fetch origin main
            TAG_COMMIT=$(git rev-parse "refs/tags/${TAG}^{commit}")
            if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
              printf '::error::Release tag %s does not point at a commit reachable from main\n' "$TAG"
              exit 1
            fi
          fi

          {
            printf 'version=%s\n' "$VERSION"
            printf 'tag=%s\n' "$TAG"
          } >> "$GITHUB_OUTPUT"

  release-preflight:
    name: Release Preflight
    needs: validate-release-ref
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate manual release readiness
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${VERSION:?missing release version}"
          : "${TAG:?missing release tag}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            printf '::error::Release tag %s already exists; choose a new version\n' "$TAG"
            exit 1
          fi

          bash scripts/update-changelog.bash --check "$VERSION"

  version-bump:
    name: Version Bump
    needs: [validate-release-ref, release-preflight]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update version in gos.sh
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
        run: |
          : "${VERSION:?missing release version}"
          sed -i "s/^GOS_VERSION=.*/GOS_VERSION=\"${VERSION}\"/" gos.sh

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
        run: |
          : "${VERSION:?missing release version}"
          bash scripts/update-changelog.bash "$VERSION"

      - name: Update package metadata
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
        run: |
          : "${VERSION:?missing release version}"
          tmp_zip=$(mktemp)
          trap 'rm -f "$tmp_zip"' EXIT
          bash scripts/build-windows-package.bash "$tmp_zip"
          WINDOWS_SHA=$(sha256sum "$tmp_zip" | cut -d' ' -f1)
          bash scripts/update-packaging.bash "$VERSION" "$WINDOWS_SHA"

      - name: Commit and tag
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${VERSION:?missing release version}"
          : "${TAG:?missing release tag}"
          # The version stamped into gos.sh must match the tag being released.
          grep -Fq "GOS_VERSION=\"${VERSION}\"" gos.sh || {
            printf '::error::gos.sh was not stamped with GOS_VERSION=%s\n' "$VERSION"
            exit 1
          }
          git add gos.sh CHANGELOG.md packaging/chocolatey/gos.nuspec packaging/chocolatey/tools/chocolateyInstall.ps1 packaging/winget/johnny4young.gos.yaml
          git commit -m "release: ${TAG}"
          git tag "$TAG"
          # Atomic push of exactly the branch and the new tag: a half-pushed
          # release (main updated, tag missing) cannot be retried cleanly.
          git push --atomic origin main "$TAG"

  smoke-test:
    name: Smoke Test
    needs: [validate-release-ref, release-preflight, version-bump]
    if: always() && needs.validate-release-ref.result == 'success' && (needs.release-preflight.result == 'success' || needs.release-preflight.result == 'skipped') && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          # On workflow_dispatch, fetch the newly pushed tag to get updated code
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Make script executable
        run: chmod +x gos.sh

      - name: Run version check
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
        run: |
          : "${VERSION:?missing release version}"
          ./gos.sh version
          # The released script must report the version being tagged.
          test "$(./gos.sh version)" = "gos v${VERSION}"

      - name: Run help check
        run: ./gos.sh help

  release:
    name: Create Release
    needs: [validate-release-ref, release-preflight, version-bump, smoke-test]
    if: always() && needs.validate-release-ref.result == 'success' && (needs.release-preflight.result == 'success' || needs.release-preflight.result == 'skipped') && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Make scripts executable
        run: chmod +x gos.sh install.sh

      - name: Patch install.sh with release tag and gos.sh SHA256
        env:
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          GOS_SHA=$(sha256sum gos.sh | cut -d' ' -f1)
          sed -i "s|^GOS_RELEASE_TAG=.*|GOS_RELEASE_TAG=\"${TAG}\"|" install.sh
          sed -i "s|^GOS_EXPECTED_SHA256=.*|GOS_EXPECTED_SHA256=\"${GOS_SHA}\"|" install.sh
          # sed exits 0 even when the anchor no longer matches; verify the patch
          # landed so a release never ships an unpinned installer.
          grep -Fq "GOS_RELEASE_TAG=\"${TAG}\"" install.sh
          grep -Fq "GOS_EXPECTED_SHA256=\"${GOS_SHA}\"" install.sh
          printf 'Patched install.sh with TAG=%s and SHA256=%s\n' "$TAG" "$GOS_SHA"

      - name: Build Windows package asset
        run: |
          bash scripts/build-windows-package.bash gos-windows.zip

      - name: Patch install.ps1 with release tag and Windows package SHA256
        env:
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          WINDOWS_SHA=$(sha256sum gos-windows.zip | cut -d' ' -f1)
          sed -i "s|^\$GosReleaseTag = .*|\$GosReleaseTag = '${TAG}'|" install.ps1
          sed -i "s|^\$GosExpectedZipSha256 = .*|\$GosExpectedZipSha256 = '${WINDOWS_SHA}'|" install.ps1
          # sed exits 0 even when the anchor no longer matches; verify the patch
          # landed so a release never ships an unpinned installer.
          grep -Fq "\$GosReleaseTag = '${TAG}'" install.ps1
          grep -Fq "\$GosExpectedZipSha256 = '${WINDOWS_SHA}'" install.ps1
          printf 'Patched install.ps1 with TAG=%s and SHA256=%s\n' "$TAG" "$WINDOWS_SHA"

      - name: Validate package metadata
        env:
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          VERSION="${TAG#v}"
          WINDOWS_SHA=$(sha256sum gos-windows.zip | cut -d' ' -f1)
          WINDOWS_URL="https://github.com/johnny4young/gos/releases/download/${TAG}/gos-windows.zip"

          grep -F "<version>${VERSION}</version>" packaging/chocolatey/gos.nuspec
          grep -F "\$url = '${WINDOWS_URL}'" packaging/chocolatey/tools/chocolateyInstall.ps1
          grep -F "\$checksum = '${WINDOWS_SHA}'" packaging/chocolatey/tools/chocolateyInstall.ps1
          grep -F "PackageVersion: ${VERSION}" packaging/winget/johnny4young.gos.yaml
          grep -F "InstallerUrl: ${WINDOWS_URL}" packaging/winget/johnny4young.gos.yaml
          grep -F "InstallerSha256: ${WINDOWS_SHA}" packaging/winget/johnny4young.gos.yaml

      - name: Generate SHA256 checksums
        run: |
          sha256sum gos.sh > checksums.txt
          sha256sum install.sh >> checksums.txt
          sha256sum install.ps1 >> checksums.txt
          sha256sum gos-windows.zip >> checksums.txt

      - name: Attest script release assets
        uses: actions/attest@v4
        with:
          subject-checksums: checksums.txt

      - name: Attest checksum manifest
        uses: actions/attest@v4
        with:
          subject-path: checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.tag }}
          # Pre-release tags (v1.2.3-rc1) must never become the release served
          # by releases/latest/download/, which stable installer users consume.
          prerelease: ${{ contains(needs.validate-release-ref.outputs.version, '-') }}
          files: |
            gos.sh
            install.sh
            install.ps1
            gos-windows.zip
            checksums.txt
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: [validate-release-ref, release]
    # Pre-releases must not reach the Homebrew tap; brew serves one version.
    if: ${{ !contains(needs.validate-release-ref.outputs.version, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the released gos source
        uses: actions/checkout@v7
        with:
          # The vendored bump script and the formula template ship with the
          # released source, so check out the published tag (not the tap).
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Publish the formula to the central Homebrew tap
        env:
          # Write-enabled deploy key for johnny4young/homebrew-tap (a repo secret).
          # The default GITHUB_TOKEN is scoped to this repository only, so the
          # cross-repo push uses the deploy key instead. Absent on forks: the
          # vendored script then warns and exits 0 so the release still succeeds.
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          VERSION="${TAG#v}"
          ARCHIVE_URL="https://github.com/johnny4young/gos/archive/refs/tags/${TAG}.tar.gz"

          # Pin the formula to the published source tarball and its checksum.
          curl -fsSL "$ARCHIVE_URL" -o /tmp/gos-release.tar.gz
          SHA=$(sha256sum /tmp/gos-release.tar.gz | cut -d' ' -f1)
          rm /tmp/gos-release.tar.gz

          # Regenerate Formula/gos.rb in johnny4young/homebrew-tap from the in-repo
          # template, validate it, and push over the deploy key. The reusable bump
          # logic lives in scripts/update-homebrew-tap.sh (vendored verbatim from the
          # same pattern vitrine uses); only the arguments differ per app.
          ./scripts/update-homebrew-tap.sh \
            --kind formula \
            --name gos \
            --version "${VERSION}" \
            --sha256 "${SHA}" \
            --url "${ARCHIVE_URL}" \
            --template packaging/Formula/gos.rb
