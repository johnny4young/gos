name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.1.0)'
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-release-ref:
    name: Validate Release Ref
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-ref.outputs.version }}
      tag: ${{ steps.release-ref.outputs.tag }}
    steps:
      - name: Validate release ref
        id: release-ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'

          case "$EVENT_NAME" in
            workflow_dispatch)
              VERSION="$INPUT_VERSION"
              if [[ ! "$VERSION" =~ $semver_re ]]; then
                printf '::error::Invalid version format %q. Use semver: 1.2.3 or 1.2.3-rc1 (no v prefix)\n' "$VERSION"
                exit 1
              fi
              TAG="v${VERSION}"
              ;;
            push)
              TAG="$REF_NAME"
              if [[ "$TAG" != v* ]]; then
                printf '::error::Release tag must start with v, got %q\n' "$TAG"
                exit 1
              fi
              VERSION="${TAG#v}"
              if [[ ! "$VERSION" =~ $semver_re ]]; then
                printf '::error::Invalid release tag %q. Use v1.2.3 or v1.2.3-rc1\n' "$TAG"
                exit 1
              fi
              ;;
            *)
              printf '::error::Unsupported release event %q\n' "$EVENT_NAME"
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "$VERSION"
            printf 'tag=%s\n' "$TAG"
          } >> "$GITHUB_OUTPUT"

  version-bump:
    name: Version Bump
    needs: validate-release-ref
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update version in gos.sh
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
        run: |
          : "${VERSION:?missing release version}"
          sed -i "s/^GOS_VERSION=.*/GOS_VERSION=\"${VERSION}\"/" gos.sh

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
        run: |
          : "${VERSION:?missing release version}"
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Collect commits since last tag (or all commits)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges | grep -v "^release:" | grep -v "^chore: update Homebrew" || true)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges | grep -v "^release:" || true)
          fi

          # Categorize commits by conventional commit prefix
          ADDED=""
          FIXED=""
          SECURITY=""
          CHANGED=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Strip prefix and categorize
            case "$line" in
              feat:*)     ADDED="${ADDED}\n- ${line#feat: }" ;;
              feat\(*)    ADDED="${ADDED}\n- ${line#feat*): }" ;;
              fix:*)      FIXED="${FIXED}\n- ${line#fix: }" ;;
              fix\(*)     FIXED="${FIXED}\n- ${line#fix*): }" ;;
              security:*) SECURITY="${SECURITY}\n- ${line#security: }" ;;
              docs:*)     CHANGED="${CHANGED}\n- ${line#docs: }" ;;
              ci:*)       CHANGED="${CHANGED}\n- ${line#ci: }" ;;
              chore:*)    CHANGED="${CHANGED}\n- ${line#chore: }" ;;
              build:*)    CHANGED="${CHANGED}\n- ${line#build: }" ;;
              refactor:*) CHANGED="${CHANGED}\n- ${line#refactor: }" ;;
              perf:*)     CHANGED="${CHANGED}\n- ${line#perf: }" ;;
              *)          CHANGED="${CHANGED}\n- ${line}" ;;
            esac
          done <<< "$COMMITS"

          # Build the new changelog entry
          ENTRY="## [${VERSION}] - ${DATE}"
          [ -n "$ADDED" ]    && ENTRY="${ENTRY}\n\n### Added\n${ADDED}"
          [ -n "$FIXED" ]    && ENTRY="${ENTRY}\n\n### Fixed\n${FIXED}"
          [ -n "$CHANGED" ]  && ENTRY="${ENTRY}\n\n### Changed\n${CHANGED}"
          [ -n "$SECURITY" ] && ENTRY="${ENTRY}\n\n### Security\n${SECURITY}"

          # Insert after header (line 5) in CHANGELOG.md
          HEADER=$(head -5 CHANGELOG.md)
          REST=$(tail -n +6 CHANGELOG.md)
          printf '%s\n\n%b\n%s\n' "$HEADER" "$ENTRY" "$REST" > CHANGELOG.md

          # Append release link
          if [ -n "$PREV_TAG" ]; then
            echo "[${VERSION}]: https://github.com/johnny4young/gos/compare/${PREV_TAG}...v${VERSION}" >> CHANGELOG.md
          else
            echo "[${VERSION}]: https://github.com/johnny4young/gos/releases/tag/v${VERSION}" >> CHANGELOG.md
          fi

          # Keep the future-change comparison anchored to the latest release.
          sed -i "s|^\[Unreleased\]: .*|[Unreleased]: https://github.com/johnny4young/gos/compare/v${VERSION}...HEAD|" CHANGELOG.md

      - name: Commit and tag
        env:
          VERSION: ${{ needs.validate-release-ref.outputs.version }}
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${VERSION:?missing release version}"
          : "${TAG:?missing release tag}"
          git add gos.sh CHANGELOG.md
          git commit -m "release: ${TAG}"
          git tag "$TAG"
          # Push only the new tag (avoid leaking unrelated local tags).
          git push origin main
          git push origin "$TAG"

  smoke-test:
    name: Smoke Test
    needs: [validate-release-ref, version-bump]
    if: always() && needs.validate-release-ref.result == 'success' && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          # On workflow_dispatch, fetch the newly pushed tag to get updated code
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Make script executable
        run: chmod +x gos.sh

      - name: Run version check
        run: ./gos.sh version

      - name: Run help check
        run: ./gos.sh help

  release:
    name: Create Release
    needs: [validate-release-ref, version-bump, smoke-test]
    if: always() && needs.validate-release-ref.result == 'success' && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release-ref.outputs.tag }}

      - name: Make scripts executable
        run: chmod +x gos.sh install.sh

      - name: Patch install.sh with release tag and gos.sh SHA256
        env:
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          GOS_SHA=$(sha256sum gos.sh | cut -d' ' -f1)
          sed -i "s|^GOS_RELEASE_TAG=.*|GOS_RELEASE_TAG=\"${TAG}\"|" install.sh
          sed -i "s|^GOS_EXPECTED_SHA256=.*|GOS_EXPECTED_SHA256=\"${GOS_SHA}\"|" install.sh
          printf 'Patched install.sh with TAG=%s and SHA256=%s\n' "$TAG" "$GOS_SHA"

      - name: Generate SHA256 checksums
        run: |
          sha256sum gos.sh > checksums.txt
          sha256sum install.sh >> checksums.txt

      - name: Attest script release assets
        uses: actions/attest@v4
        with:
          subject-checksums: checksums.txt

      - name: Attest checksum manifest
        uses: actions/attest@v4
        with:
          subject-path: checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.tag }}
          files: |
            gos.sh
            install.sh
            checksums.txt
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: [validate-release-ref, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-gos tap
        uses: actions/checkout@v5
        with:
          repository: johnny4young/homebrew-gos
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Formula/gos.rb with new version and SHA256
        env:
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          VERSION="${TAG#v}"
          ARCHIVE_URL="https://github.com/johnny4young/gos/archive/refs/tags/${TAG}.tar.gz"

          # Download the release archive and compute SHA256
          curl -fsSL "$ARCHIVE_URL" -o /tmp/gos-release.tar.gz
          SHA=$(sha256sum /tmp/gos-release.tar.gz | cut -d' ' -f1)
          rm /tmp/gos-release.tar.gz

          # Update formula in the tap repo
          sed -i "s|url \".*\"|url \"${ARCHIVE_URL}\"|" Formula/gos.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/gos.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/gos.rb

          printf 'Updated Formula/gos.rb: version=%s sha256=%s\n' "$VERSION" "$SHA"

      - name: Commit and push to homebrew-gos
        env:
          TAG: ${{ needs.validate-release-ref.outputs.tag }}
        run: |
          : "${TAG:?missing release tag}"
          git add Formula/gos.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update formula for ${TAG}"
          git push origin main
