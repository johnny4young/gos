PackageIdentifier: johnny4young.gos
PackageVersion: 1.0.0
PackageName: gos
Publisher: johnny4young
License: MIT
LicenseUrl: https://github.com/johnny4young/gos/blob/main/LICENSE
ShortDescription: Install and switch Go versions in seconds. One script. Zero dependencies.
Description: |-
  gos (Go Switch) is a simple, cross-platform Bash script that installs and switches
  Go versions. It auto-detects your OS and CPU architecture, downloads the official
  binary from go.dev, and puts it in place. No runtimes, no plugins, no config files.
Tags:
